[[ifaces]]
name = "eth0"
zone_type = "wan"
enable_in_boot = true

[[ifaces]]
name = "br_lan"
create_dev_type = "bridge"
zone_type = "lan"
enable_in_boot = true

[[ifaces]]
name = "eth1"
controller_name = "br_lan"
enable_in_boot = true

[[ifaces]]
name = "wlan0"
controller_name = "br_lan"
enable_in_boot = true
wifi_mode = "ap"

[[ipconfigs]]
iface_name = "eth0"
enable = true

[ipconfigs.ip_model]
t = "dhcpclient"
default_router = true

[[nats]]
iface_name = "eth0"
enable = true

[[wifi_configs]]
iface_name = "wlan0"
enable = true
config = """
# 基本接口配置
interface=wlan0
driver=nl80211

# WiFi 6核心设置
hw_mode=a
ieee80211n=1
ieee80211ac=1
ieee80211ax=1
wmm_enabled=1

# 网络标识
ssid=Landscape-test
country_code=CN

# 5GHz频段配置
channel=36
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40]

# 使用基础VHT配置
vht_capab=[SHORT-GI-80]
vht_oper_chwidth=0

# 安全认证
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=landscapetest

# 简化HE配置
he_oper_chwidth=0
he_su_beamformer=1
"""

[[dhcpv4_services]]
iface_name = "br_lan"
enable = true

[dhcpv4_services.config]
ip_range_start = "100.150.1.2"
ip_range_end = "100.150.1.255"
server_ip_addr = "100.150.1.10"
network_mask = 24

[[route_lans]]
iface_name = "br_lan"
enable = true

[[route_wans]]
iface_name = "eth0"
enable = true

[[static_nat_mappings]]
enable = true
remark = "Default DHCPv4 Client Port"
lan_ipv4 = "0.0.0.0"
ipv4_l4_protocol = [17]
ipv6_l4_protocol = []

[[static_nat_mappings.mapping_pair_ports]]
wan_port = 68
lan_port = 68

[[static_nat_mappings]]
enable = true
remark = "Default DHCPv6 Client Port"
lan_ipv6 = "::"
ipv4_l4_protocol = []
ipv6_l4_protocol = [17]

[[static_nat_mappings.mapping_pair_ports]]
wan_port = 546
lan_port = 546

[[static_nat_mappings]]
enable = true
remark = ""
lan_ipv4 = "0.0.0.0"
ipv4_l4_protocol = [6]
ipv6_l4_protocol = []

[[static_nat_mappings.mapping_pair_ports]]
wan_port = 22
lan_port = 22

[[static_nat_mappings.mapping_pair_ports]]
wan_port = 6443
lan_port = 6443
